name: Send Playlist to Allephba

on:
  workflow_dispatch:

jobs:
  send-playlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run send playlist
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python send_playlist.py

      - name: Commit seen file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_playlist_allephba.json
          git diff --cached --quiet || git commit -m "Update playlist seen list"
          git pull --rebase
          git push
